<style>
  :root {
    color-scheme: dark;
    /* colors expressed as r g b for tailwind alpha support, derived from the oklch dark theme */
    --background: 15 15 15;      /* oklch(0.06 0 0) approx */
    --foreground: 250 250 250;   /* oklch(0.98 0 0) approx */
    --card: 28 28 28;            /* oklch(0.11 0 0) approx */
    --border: 255 255 255;       /* used with low alpha for oklch(1 0 0 / 8%) */
    --muted-foreground: 158 158 158; /* oklch(0.62 0 0) approx */
    --primary: 250 250 250;
    --primary-foreground: 23 23 23;
  }

  * {
    border-color: rgb(var(--border) / 0.08);
  }

  html, body {
    background-color: rgb(var(--background));
    color: rgb(var(--foreground));
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }

  .border-border { border-color: rgb(var(--border) / 0.08); }
  .bg-card\/40 { background-color: rgb(var(--card) / 0.4); }
  .bg-card { background-color: rgb(var(--card)); }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .animate-fade-in-up {
    opacity: 0;
    animation: fade-in-up 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .animate-fade-in {
    opacity: 0;
    animation: fade-in 1.4s ease forwards;
  }
  @media (prefers-reduced-motion: reduce) {
    .animate-fade-in-up, .animate-fade-in {
      animation: none;
      opacity: 1;
    }
  }

  .tabular-nums { font-variant-numeric: tabular-nums; }

  /* Atmospheric glows */
  .glow-top {
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.08), transparent 70%);
  }
  .glow-bottom {
    background: radial-gradient(ellipse at center, rgba(120,140,180,0.06), transparent 70%);
  }

  /* Teaser carousel arrows */
  .teaser-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 2.5rem;
    width: 2.5rem;
    border-radius: 9999px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgb(var(--border) / 0.12);
    color: rgb(var(--foreground));
    backdrop-filter: blur(6px);
    transition: background-color 0.2s ease, transform 0.2s ease;
    opacity: 0;
  }
  .group:hover .teaser-arrow {
    opacity: 1;
  }
  .teaser-arrow:hover {
    background: rgba(0,0,0,0.65);
  }
  .teaser-arrow:active {
    transform: translateY(-50%) scale(0.94);
  }
  .teaser-dots {
    position: absolute;
    bottom: 0.6rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 0.4rem;
  }
  .teaser-dot {
    height: 5px;
    width: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.35);
    transition: background-color 0.2s ease, width 0.2s ease;
  }
  .teaser-dot.active {
    background: rgba(255,255,255,0.95);
    width: 16px;
  }

  /* Release overlay */
  #release-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.1s ease;
  }
  #release-overlay.is-visible {
    opacity: 1;
    pointer-events: auto;
  }
  #release-video {
    position: absolute;
    inset: 0;
    height: 100%;
    width: 100%;
    object-fit: contain;
    background: #000;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #release-video.is-visible {
    opacity: 1;
  }
  #tap-to-play {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.75rem;
    background: rgba(0,0,0,0.6);
    color: #fff;
  }
  #app-root {
    transition: opacity 0.8s ease;
  }
</style>

<script>
  // ---------- Fallback config (used only if config.json can't be fetched) ----------
  const DEFAULT_CONFIG = {
    targetDateUTC: '2026-07-26T21:00:00.000Z', // 2026-07-27 00:00 Europe/Bucharest (EEST, UTC+3)
    releaseUrl: '',
    teasers: [
      {
        id: 'teaser-1',
        videoUrl: 'https://images.guns.lol/833fa64160898cf1c256407d95f21d8f4f1fae95/2uyohh.mp4',
        posterUrl: 'https://images.guns.lol/833fa64160898cf1c256407d95f21d8f4f1fae95/iTIDle.jpeg',
        createdAt: '2026-07-23T10:00:00.000Z',
      },
    ],
  };

  let CONFIG = null;
  let teasers = [];
  let teaserIndex = 0;
  let countdownTimer = null;
  let released = false;

  // ---------- Load config (or a forced test payload) ----------
  async function loadConfig() {
    const params = new URLSearchParams(window.location.search);

    if (params.get('test') === 'release') {
      // Admin "Test release" mode: read a one-off payload the admin page stashed in localStorage.
      try {
        const raw = localStorage.getItem('noxy_test_config');
        if (raw) return JSON.parse(raw);
      } catch (e) { /* fall through to defaults */ }
    }

    try {
      const res = await fetch('config.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('config fetch failed');
      const data = await res.json();
      if (!data.teasers || !data.teasers.length) data.teasers = DEFAULT_CONFIG.teasers;
      return data;
    } catch (e) {
      return DEFAULT_CONFIG;
    }
  }

  // ---------- Teaser carousel ----------
  function setupTeasers() {
    teasers = [...CONFIG.teasers].sort(
      (a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime()
    );
    teaserIndex = 0;

    const prevBtn = document.getElementById('teaser-prev');
    const nextBtn = document.getElementById('teaser-next');
    const dotsWrap = document.getElementById('teaser-dots');

    if (teasers.length > 1) {
      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';
      dotsWrap.innerHTML = teasers.map((_, i) =>
        `<span class="teaser-dot${i === 0 ? ' active' : ''}"></span>`
      ).join('');
    } else {
      prevBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      dotsWrap.innerHTML = '';
    }

    renderTeaser(0);

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      renderTeaser((teaserIndex - 1 + teasers.length) % teasers.length);
    });
    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      renderTeaser((teaserIndex + 1) % teasers.length);
    });
  }

  function renderTeaser(index) {
    teaserIndex = index;
    const t = teasers[teaserIndex];
    const video = document.getElementById('teaser-video');
    const source = document.getElementById('teaser-source');

    video.pause();
    video.poster = t.posterUrl || '';
    source.src = t.videoUrl;
    video.load();
    updatePlayIcon(false);
    document.getElementById('center-play-btn').classList.remove('hidden');
    const bar = document.getElementById('control-bar');
    bar.classList.remove('opacity-100');
    bar.classList.add('opacity-0');

    document.querySelectorAll('.teaser-dot').forEach((d, i) => {
      d.classList.toggle('active', i === teaserIndex);
    });
  }

  // ---------- Countdown ----------
  const UNITS = [
    { key: 'days', label: 'Days' },
    { key: 'hours', label: 'Hours' },
    { key: 'minutes', label: 'Minutes' },
    { key: 'seconds', label: 'Seconds' },
  ];

  function getTimeLeft(targetMs) {
    const diff = Math.max(0, targetMs - Date.now());
    return {
      days: Math.floor(diff / (1000 * 60 * 60 * 24)),
      hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
      minutes: Math.floor((diff / (1000 * 60)) % 60),
      seconds: Math.floor((diff / 1000) % 60),
    };
  }

  function renderCountdown(targetMs) {
    const time = getTimeLeft(targetMs);
    const container = document.getElementById('countdown');
    container.innerHTML = UNITS.map(({ key, label }) => `
      <div class="flex flex-col items-center rounded-xl border border-border bg-card/40 px-4 py-5 backdrop-blur-sm sm:px-6 sm:py-7">
        <span class="font-sans text-4xl font-semibold tabular-nums tracking-tight text-foreground sm:text-5xl md:text-6xl">
          ${String(time[key]).padStart(2, '0')}
        </span>
        <span class="mt-2 text-[0.65rem] font-medium uppercase tracking-[0.25em] text-muted-foreground sm:text-xs">
          ${label}
        </span>
      </div>
    `).join('');

    if (targetMs - Date.now() <= 0 && !released) {
      clearInterval(countdownTimer);
      startReleaseSequence();
    }
  }

  // ---------- Release sequence: blackout -> fullscreen autoplay ----------
  function startReleaseSequence() {
    released = true;
    const releaseUrl = CONFIG.releaseUrl;
    const overlay = document.getElementById('release-overlay');
    const appRoot = document.getElementById('app-root');
    const relVideo = document.getElementById('release-video');
    const tapToPlay = document.getElementById('tap-to-play');

    if (!releaseUrl) {
      // Nothing set yet — just show a simple "released" message instead of breaking.
      document.getElementById('header-sub').textContent = "It's out. Release link hasn't been set yet — check back shortly.";
      document.getElementById('countdown-section').style.display = 'none';
      return;
    }

    appRoot.style.opacity = '0';
    overlay.classList.add('is-visible');

    setTimeout(() => {
      appRoot.style.display = 'none';
      relVideo.src = releaseUrl;
      relVideo.muted = false;
      relVideo.classList.add('is-visible');

      const goFullscreen = () => {
        const req = relVideo.requestFullscreen || relVideo.webkitRequestFullscreen || relVideo.webkitEnterFullscreen;
        if (req) { try { req.call(relVideo); } catch (e) {} }
      };

      relVideo.play().then(() => {
        goFullscreen();
      }).catch(() => {
        // Autoplay with sound was blocked by the browser — fall back to a muted
        // autoplay and ask for one tap to unmute + go fullscreen with sound.
        relVideo.muted = true;
        relVideo.play().catch(() => {});
        tapToPlay.style.display = 'flex';
        tapToPlay.addEventListener('click', () => {
          relVideo.muted = false;
          relVideo.play();
          goFullscreen();
          tapToPlay.style.display = 'none';
        }, { once: true });
      });
    }, 1400);
  }

  // ---------- Teaser video player controls (mirrors original behaviour) ----------
  const video = document.getElementById('teaser-video');
  const centerPlayBtn = document.getElementById('center-play-btn');
  const controlBar = document.getElementById('control-bar');
  const playBtn = document.getElementById('play-btn');
  const muteBtn = document.getElementById('mute-btn');
  const progressTrack = document.getElementById('progress-track');
  const progressFill = document.getElementById('progress-fill');

  function updatePlayIcon(playing) {
    const iconName = playing ? 'pause' : 'play';
    playBtn.innerHTML = `<i data-lucide="${iconName}" class="h-5 w-5" style="fill: currentColor;"></i>`;
    lucide.createIcons();
  }

  function updateMuteIcon(muted) {
    const iconName = muted ? 'volume-x' : 'volume-2';
    muteBtn.innerHTML = `<i data-lucide="${iconName}" class="h-5 w-5"></i>`;
    lucide.createIcons();
  }

  function togglePlay() {
    if (video.paused) {
      video.play();
      centerPlayBtn.classList.add('hidden');
      controlBar.classList.remove('opacity-0');
      controlBar.classList.add('opacity-100');
      updatePlayIcon(true);
    } else {
      video.pause();
      updatePlayIcon(false);
    }
  }

  function toggleMute() {
    video.muted = !video.muted;
    updateMuteIcon(video.muted);
  }

  centerPlayBtn.addEventListener('click', togglePlay);
  playBtn.addEventListener('click', togglePlay);
  video.addEventListener('click', togglePlay);
  muteBtn.addEventListener('click', toggleMute);

  video.addEventListener('timeupdate', () => {
    if (!video.duration) return;
    const progress = (video.currentTime / video.duration) * 100;
    progressFill.style.width = progress + '%';
    progressTrack.setAttribute('aria-valuenow', Math.round(progress));
  });

  video.addEventListener('ended', () => updatePlayIcon(false));

  progressTrack.addEventListener('click', (e) => {
    if (!video.duration) return;
    const rect = progressTrack.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    video.currentTime = ratio * video.duration;
    progressFill.style.width = (ratio * 100) + '%';
  });

  // ---------- Pre-save form ----------
  const presaveForm = document.getElementById('presave-form');
  const presaveSuccess = document.getElementById('presave-success');

  presaveForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('presave-email').value;
    if (!email) return;
    // In a real build this would post to a mailing-list endpoint.
    presaveForm.classList.add('hidden');
    presaveSuccess.classList.remove('hidden');
    presaveSuccess.classList.add('flex');
    lucide.createIcons();
  });

  // ---------- Init ----------
  (async function init() {
    CONFIG = await loadConfig();
    setupTeasers();

    const params = new URLSearchParams(window.location.search);
    const forceRelease = params.get('test') === 'release';
    const targetMs = new Date(CONFIG.targetDateUTC).getTime();

    if (forceRelease || Date.now() >= targetMs) {
      document.getElementById('countdown-section').style.display = 'none';
      startReleaseSequence();
    } else {
      renderCountdown(targetMs);
      countdownTimer = setInterval(() => renderCountdown(targetMs), 1000);
    }

    lucide.createIcons();
  })();
</script>

</body>
</html>
